spring.application.name=auth-service
server.port=8081
# carga application-local.properties automaticamente - ese archivo no se sube al repo
spring.profiles.active=local

# -------------------------------------------------------
# BASE DE DATOS
# Cambiar los siguientes valores una vez tengas MySQL listo
# Crear la base de datos con: CREATE DATABASE worki_auth_db;
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/worki_auth_db
spring.datasource.username=root
spring.datasource.password=REEMPLAZAR
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / HIBERNATE
# ddl-auto=update crea/actualiza las tablas automaticamente
# Cambiar a validate o none en produccion
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# JWT
# Cambiar el secret por una cadena de al menos 32 caracteres
# -------------------------------------------------------
# Generar secret con: openssl rand -base64 32 (Git Bash en Windows)
# O en PowerShell: [Convert]::ToBase64String((1..32 | ForEach-Object { [byte](Get-Random -Max 256) }))
jwt.secret=REEMPLAZAR
jwt.expiration-ms=86400000
