spring.application.name=auth-service
server.port=8081
# carga application-local.properties automaticamente - ese archivo no se sube al repo
spring.profiles.active=local

# -------------------------------------------------------
# BASE DE DATOS
# La base de datos se crea automaticamente si no existe
# Reemplaza el password con el tuyo
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/worki_auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=REEMPLAZAR
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / HIBERNATE
# ddl-auto=update crea/actualiza las tablas automaticamente
# Cambiamos esto a validate o none cuando vayamos a produccion
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# JWT
# Generamos el secret con alguno de estos comandos y lo ponemos en application-local.properties
# openssl rand -base64 32 (Git Bash en Windows)
# [Convert]::ToBase64String((1..32 | ForEach-Object { [byte](Get-Random -Max 256) })) (PowerShell)
# -------------------------------------------------------
jwt.secret=REEMPLAZAR
jwt.expiration-ms=86400000
