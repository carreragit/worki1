spring.application.name=auth-service
server.port=8081

# -------------------------------------------------------
# BASE DE DATOS
# Cambiar los siguientes valores una vez tengas MySQL listo
# Crear la base de datos con: CREATE DATABASE worki_auth_db;
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/worki_auth_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / HIBERNATE
# ddl-auto=update crea/actualiza las tablas automáticamente
# Cambiar a validate o none en producción
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# JWT
# Cambiar el secret por una cadena de al menos 32 caracteres
# -------------------------------------------------------
jwt.secret=cambiar-este-secret-por-uno-seguro-de-32chars
jwt.expiration-ms=86400000
