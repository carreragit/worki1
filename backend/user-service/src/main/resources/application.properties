spring.application.name=user-service
server.port=8082

# -------------------------------------------------------
# BASE DE DATOS
# Cambiar los siguientes valores una vez tengas MySQL listo
# Crear la base de datos con: CREATE DATABASE worki_user_db;
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/worki_user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / HIBERNATE
# ddl-auto=update crea/actualiza las tablas automaticamente
# Cambiar a validate o none en produccion
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# ENCODING
# Fuerza UTF-8 en requests y responses para aceptar ñ, tildes y otros caracteres especiales
# -------------------------------------------------------
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# -------------------------------------------------------
# INICIALIZACIcion DE DATOS (MOCK DATA)
# -------------------------------------------------------
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

