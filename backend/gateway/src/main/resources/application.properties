spring.application.name=gateway
server.port=8080

# -------------------------------------------------------
# RUTAS DEL GATEWAY
# Cada ruta redirige al microservicio correspondiente
# Cambiar la URI si los servicios corren en otro host/puerto
# -------------------------------------------------------
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[2].id=publication-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/publications/**

spring.cloud.gateway.routes[3].id=interaction-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/interactions/**
