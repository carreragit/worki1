spring.application.name=gateway
server.port=8080
spring.profiles.active=local

# -------------------------------------------------------
# JWT
# El secret debe ser identico al de auth-service
# El valor real va en application-local.properties (no sube al repo)
# -------------------------------------------------------
jwt.secret=REEMPLAZAR

# -------------------------------------------------------
# RUTAS DEL GATEWAY
# Cada ruta redirige al microservicio correspondiente.
# Los paths deben coincidir exactamente con los @RequestMapping de cada controller.
#
# Los URIs usan variables de entorno con valor por defecto (sintaxis ${VAR:default}):
#   - En local usa localhost (el default) sin necesidad de configurar nada.
#   - En Docker se pasan AUTH_SERVICE_URL, USER_SERVICE_URL e INTERACTION_SERVICE_URL
#     como variables de entorno en docker-compose.yml, apuntando al nombre del contenedor.
# -------------------------------------------------------
# auth-service (puerto 8081): login, registro, verificacion de email, recuperacion de password
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

# user-service (puerto 8082): perfiles de usuario, trabajadores y oficios ofrecidos
spring.cloud.gateway.server.webflux.routes[1].id=user-service-perfiles
spring.cloud.gateway.server.webflux.routes[1].uri=${USER_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/perfiles/**

spring.cloud.gateway.server.webflux.routes[2].id=user-service-trabajadores
spring.cloud.gateway.server.webflux.routes[2].uri=${USER_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/trabajadores/**

spring.cloud.gateway.server.webflux.routes[3].id=user-service-oficios
spring.cloud.gateway.server.webflux.routes[3].uri=${USER_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/oficios/**

# interaction-service (puerto 8084): solicitudes de servicio y calificaciones
spring.cloud.gateway.server.webflux.routes[4].id=interaction-service
spring.cloud.gateway.server.webflux.routes[4].uri=${INTERACTION_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/interacciones/**

# -------------------------------------------------------
# CORS
# Necesario para la versionn web.
# En movil nativo no aplica, por eso no era necesario antes.
# Agregar aqui el dominio de Cloudflare cuando se despliegue ahi.
# -------------------------------------------------------
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:19001,http://192.168.0.5:19000,https://worki1.pages.dev,https://necesitoworki.com
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true
