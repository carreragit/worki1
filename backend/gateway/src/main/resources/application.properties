spring.application.name=gateway
server.port=8080
spring.profiles.active=local

# -------------------------------------------------------
# JWT
# El secret debe ser identico al de auth-service
# El valor real va en application-local.properties (no sube al repo)
# -------------------------------------------------------
jwt.secret=REEMPLAZAR

# -------------------------------------------------------
# RUTAS DEL GATEWAY
# Cada ruta redirige al microservicio correspondiente
# Los paths deben coincidir exactamente con los @RequestMapping de cada controller
# -------------------------------------------------------
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webflux.routes[2].id=interaction-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/interacciones/**
