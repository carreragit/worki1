spring.application.name=interaction-service
server.port=8084

# -------------------------------------------------------
# BASE DE DATOS
# Crear la base de datos con: CREATE DATABASE worki_interaction_db;
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/worki_interaction_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / HIBERNATE
# ddl-auto=update crea/actualiza las tablas automáticamente
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
