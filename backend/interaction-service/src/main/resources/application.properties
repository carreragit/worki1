spring.application.name=interaction-service
server.port=8084

# -------------------------------------------------------
# BASE DE DATOS
# Crear la base de datos con: CREATE DATABASE worki_interaction_db;
# -------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/worki_interaction_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / HIBERNATE
# ddl-auto=update crea/actualiza las tablas automáticamente
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -------------------------------------------------------
# COMUNICACION INTER-SERVICIOS
# Llamadas directas por puerto, sin pasar por el gateway
# -------------------------------------------------------
# En Docker se sobreescribe con USER_SERVICE_URL via docker-compose
user-service.url=${USER_SERVICE_URL:http://localhost:8082}

# -------------------------------------------------------
# ARCHIVOS ESTATICOS (imágenes del chat)
# Sirve las imágenes subidas al chat desde la carpeta uploads/
# -------------------------------------------------------
spring.web.resources.static-locations=file:uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

# -------------------------------------------------------
# JWT
# El secret debe ser identico al de auth-service y gateway.
# El valor real va en application-local.properties (no sube al repo).
# En Docker se inyecta via variable de entorno JWT_SECRET.
# -------------------------------------------------------
jwt.secret=${JWT_SECRET:REEMPLAZAR}
